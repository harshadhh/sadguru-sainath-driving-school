<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Sadguru Sainath Driving School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="login-page">

  <div class="login-card">

    <div class="logo login-logo">
      <div class="logo-icon">S</div>
      <div class="logo-text">
        <span class="logo-name">Sadguru Sainath</span>
        <span class="logo-sub">Driving School · Lohegaon, Pune</span>
      </div>
    </div>

    <h1 class="login-title">Admin Login</h1>
    <p class="login-subtitle">Sign in to manage your school's daily data</p>

    <div id="loginError" class="alert alert-error" style="display:none;"></div>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-pw-wrap">
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required />
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Show password">👁</button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In to Dashboard →</button>
    </form>

    <p class="login-footer">🔒 Private access only — not linked from the public website.</p>

  </div>

  <script src="admin-auth.js"></script>
</body>
</html>
